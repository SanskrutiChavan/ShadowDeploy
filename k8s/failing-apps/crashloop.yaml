apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-app
  labels:
    app: crashloop-app
    failure-type: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-app
  template:
    metadata:
      labels:
        app: crashloop-app
        failure-type: crashloop
    spec:
      containers:
      - name: app
        image: crashloop-app:latest
        imagePullPolicy: Never
        resources:
          limits:
            memory: "128Mi"
            cpu: "250m"