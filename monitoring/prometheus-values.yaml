serverFiles:
  prometheus.yml:
    global:
      scrape_interval: 15s

    scrape_configs:

      # ShadowDeploy Metrics
      - job_name: shadowdeploy

        metrics_path: /metrics

        static_configs:
          - targets:
              - host.minikube.internal:8000

      # Kubernetes Pods
      - job_name: kubernetes-pods

        kubernetes_sd_configs:
          - role: pod

        relabel_configs:
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape

            action: keep

            regex: true

server:
  service:
    type: NodePort

alertmanager:
  enabled: false